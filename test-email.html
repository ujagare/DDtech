<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>DD Tech Email Diagnostics</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 20px;
        background: #f5f5f5;
      }

      .container {
        background: #fff;
        padding: 28px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        color: #7d0a0a;
        margin-top: 0;
      }

      .btn {
        background: #7d0a0a;
        color: #fff;
        padding: 12px 18px;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        font-size: 14px;
        width: 100%;
        margin-top: 12px;
      }

      .btn:disabled {
        background: #b7b7b7;
        cursor: not-allowed;
      }

      .note,
      .result {
        margin-top: 18px;
        padding: 14px;
        border-radius: 10px;
      }

      .note {
        background: #f8f2f1;
        color: #532020;
        border: 1px solid #ead8d4;
      }

      .success {
        background: #eaf7ed;
        border: 1px solid #b9dfc2;
        color: #175728;
      }

      .error {
        background: #fdecec;
        border: 1px solid #efc3c3;
        color: #7a1f1f;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>DD Tech Email Diagnostics</h1>
      <p>
        This page is intended for local diagnostics only. Production test
        endpoints stay disabled unless `ENABLE_EMAIL_TEST_ENDPOINTS=true`.
      </p>

      <div class="note">
        Use the same environment variables as production:
        <code>RESEND_API_KEY</code>, <code>RESEND_FROM_EMAIL</code>, and
        <code>RESEND_TO_EMAIL</code>.
      </div>

      <button class="btn" id="testBtn" onclick="sendTestEmail()">
        Send Test Email
      </button>

      <div class="result" id="result" hidden></div>
    </div>

    <script>
      async function sendTestEmail() {
        const btn = document.getElementById("testBtn");
        const result = document.getElementById("result");

        btn.disabled = true;
        btn.textContent = "Sending...";
        result.hidden = true;
        result.className = "result";

        try {
          const response = await fetch("/api/test-email", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({}),
          });

          const data = await response.json();

          result.hidden = false;
          if (response.ok && data.success) {
            result.classList.add("success");
            result.innerHTML = `Test email sent successfully.<br /><strong>Email ID:</strong> ${data.emailId}`;
          } else {
            result.classList.add("error");
            result.textContent =
              data.error ||
              "Test endpoint is disabled or unavailable in this environment.";
          }
        } catch (error) {
          result.hidden = false;
          result.classList.add("error");
          result.textContent = `Request failed: ${error.message}`;
        }

        btn.disabled = false;
        btn.textContent = "Send Test Email";
      }
    </script>
  </body>
</html>
